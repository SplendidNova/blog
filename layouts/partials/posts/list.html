<!-- Posts -->
{{ $data := .siteData }}
<section class="posts">
    {{ range .posts.Pages }}
    <article>
        {{ if .Params.image }}
        <a href="{{ .Permalink }}" class="article-image image fit"><img src="{{ .Params.image | relURL }}" alt="" /></a>
        {{ end }}
        <div class="article-text">
            <header>
                {{ if not .Date.IsZero }}
                <span class="date">{{ .Date.Format (.Site.Params.DateFormat | default "January 2, 2006") }}</span>
                {{ end }}
                <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
            </header>
            
            {{ if .Description }}
            <p>{{ .Description }}</p>
            {{ else }}
            <p>{{ .Summary }}</p>
            {{ end }}
        </div>        
    </article>
    {{ end }}
</section>
